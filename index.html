<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fav Mitski Songs</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
    <div class="title-bar">
        <div class="drag-region"></div>
        <div class="window-controls">
            <button class="min-btn" title="Minimize">
                <img src="icons/minimize.png" alt="Minimize">
            </button>
            <button class="close-btn" title="Close">
                <img src="icons/close.png" alt="Close">
            </button>
        </div>
    </div>
        <div class="player-container">
                <div class="screen" id="dropArea">
                    <img id="coverImage" src="covers/bg3.png" alt="Cover Image" class="cover-image" />
                    <p class="song-title">song here</p>
                    <div class="controls">
                        <button id="prevBtn" class="img-button"><img src="icons/prev.png"
                                alt="Previous"></button>
                        <button id="playPause" class="img-button"><img id="playPauseIcon" src="icons/pause.png"
                                alt="playPause"></button>
                        <button id="nextBtn" class="img-button"><img src="icons/next.png" alt="Next"></button>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                </div>
                <input type="file" id="fileInput" accept="audio/*" hidden>
                <audio id="audio"></audio>
            </div>
        </div>
                <script src="script.js"></script>
</body>

</html>
